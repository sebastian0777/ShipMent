<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShipMent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #050b16;
      --bg-2: #10223d;
      --text: #edf2ff;
      --muted: #9fb1cf;
      --line: rgba(173, 197, 236, 0.28);
      --soft: rgba(173, 197, 236, 0.1);
      --accent-1: #38bdf8;
      --accent-2: #fb923c;
      --success: #34d399;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(56, 189, 248, 0.2), transparent 34%),
        radial-gradient(circle at 85% 12%, rgba(251, 146, 60, 0.2), transparent 30%),
        radial-gradient(circle at 50% 95%, rgba(52, 211, 153, 0.15), transparent 32%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      animation: rise 700ms ease-out;
    }

    .hero {
      text-align: center;
      margin-bottom: 30px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-family: "Fraunces", serif;
      font-size: clamp(2.15rem, 4.4vw, 3.5rem);
      letter-spacing: 0.7px;
      font-weight: 700;
      background: linear-gradient(110deg, #d9e7ff, #8bd6ff, #ffcb98, #d9e7ff);
      background-size: 280% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 8s linear infinite, float-title 4s ease-in-out infinite;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
      letter-spacing: 0.2px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 28px;
    }

    .signature {
      margin: 18px 0 0;
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: #b7c8e7;
      opacity: 0.9;
    }

    .signature strong {
      color: #dbeafe;
      font-weight: 700;
    }

    .panel {
      background: linear-gradient(160deg, rgba(11, 22, 44, 0.35), rgba(11, 22, 44, 0.12));
      border-radius: 24px;
      padding: 20px 18px 18px;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 0;
      height: 2px;
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.7), rgba(251, 146, 60, 0.7));
      pointer-events: none;
    }

    .panel h2 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0.45px;
      text-transform: uppercase;
    }

    .person-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--line);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    .motivos {
      display: grid;
      gap: 14px;
      margin-bottom: 16px;
    }

    label {
      font-size: 0.78rem;
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.9px;
    }

    input[type="text"], textarea {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      border-radius: 0;
      padding: 10px 0;
      font: inherit;
      outline: none;
      transition: border-color 180ms ease, background-color 180ms ease;
    }

    input[type="text"]:focus, textarea:focus {
      border-bottom-color: var(--accent-1);
      background: rgba(255, 255, 255, 0.02);
    }

    textarea {
      min-height: 62px;
      resize: vertical;
    }

    .cards {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .custom-punishment {
      margin: 0 0 16px;
    }

    .custom-row {
      display: flex;
      gap: 8px;
      align-items: end;
    }

    .custom-row input {
      flex: 1;
    }

    .add-punishment {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: #dbeafe;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.86rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .punishment {
      border: 0;
      border-radius: 14px;
      padding: 6px;
      background: transparent;
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease;
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .punishment:hover {
      transform: translateX(3px);
      background: var(--soft);
    }

    .punishment input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .punishment img {
      width: 76px;
      height: 76px;
      object-fit: cover;
      display: block;
      filter: saturate(1.1);
      border-radius: 10px;
    }

    .punishment .txt {
      font-size: 0.95rem;
      color: #d9e6ff;
      font-weight: 600;
    }

    .punishment-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
    }

    .remove-punishment-btn {
      border: 1px solid rgba(248, 113, 113, 0.4);
      background: rgba(248, 113, 113, 0.12);
      color: #fecaca;
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .remove-punishment-btn svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .punishment:has(input:checked) {
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.2), rgba(52, 211, 153, 0.18));
      transform: translateX(0);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 150ms ease, filter 150ms ease, opacity 150ms ease;
    }

    .save {
      background: linear-gradient(120deg, var(--accent-1), #2dd4bf);
      color: #02131a;
      flex: 1;
    }

    .clear {
      background: transparent;
      color: #dbeafe;
      border: 1px solid var(--line);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.07);
    }

    .custom-row .add-punishment {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: #dbeafe;
    }

    .history {
      border-top: 1px solid var(--line);
      margin-top: 12px;
      padding-top: 12px;
      max-height: 300px;
      overflow: auto;
      display: grid;
      gap: 12px;
    }

    .entry {
      background: transparent;
      border: 0;
      border-left: 2px solid rgba(56, 189, 248, 0.45);
      border-radius: 0;
      padding: 2px 0 2px 10px;
      animation: pop 260ms ease;
    }

    .entry .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.86rem;
      color: #c7d2fe;
      flex-wrap: wrap;
    }

    .entry-tools {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .attach-proof-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: #dbeafe;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.78rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .attach-proof-btn svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .entry .motivo {
      margin: 6px 0 3px;
      font-weight: 600;
      word-break: break-word;
    }

    .entry .nota {
      margin: 0;
      color: #c6d7f6;
      font-size: 0.92rem;
      word-break: break-word;
    }

    .proof-media {
      margin-top: 8px;
      width: min(100%, 340px);
      border-radius: 12px;
      border: 1px solid var(--line);
      display: block;
    }

    .empty {
      color: #b8caeb;
      font-size: 0.92rem;
      opacity: 0.9;
    }

    .panel.sebastian h2 { color: #7dd3fc; }
    .panel.valentina h2 { color: #fdba74; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shine {
      0% { background-position: 0% 50%; }
      100% { background-position: 280% 50%; }
    }

    @keyframes float-title {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 950px) {
      .board {
        grid-template-columns: none;
        grid-auto-flow: column;
        grid-auto-columns: minmax(82vw, 420px);
        overflow-x: auto;
        gap: 14px;
        padding-bottom: 6px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }
      .board::-webkit-scrollbar {
        height: 6px;
      }
      .board::-webkit-scrollbar-thumb {
        background: rgba(173, 197, 236, 0.45);
        border-radius: 999px;
      }
      .panel {
        scroll-snap-align: start;
      }
    }

    @media (max-width: 600px) {
      body { padding: 16px; }
      .wrap { max-width: 100%; }
      .hero { margin-bottom: 24px; }
      .hero h1 { font-size: clamp(1.75rem, 8.6vw, 2.2rem); }
      .actions { flex-direction: column; }
      .hero p { font-size: 0.9rem; }
      .board {
        gap: 12px;
        grid-auto-columns: minmax(88vw, 360px);
      }
      .panel {
        border-radius: 18px;
        padding: 12px 11px 11px;
      }
      .panel h2 { font-size: 1rem; }
      label {
        font-size: 0.68rem;
        letter-spacing: 0.7px;
      }
      input[type="text"], textarea {
        font-size: 0.9rem;
      }
      .cards { gap: 10px; margin-bottom: 14px; }
      .avatar {
        width: 52px;
        height: 52px;
      }
      .custom-row {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      .add-punishment {
        width: 100%;
        font-size: 0.8rem;
      }
      .punishment img {
        width: 56px;
        height: 56px;
      }
      .punishment {
        gap: 10px;
        padding: 5px;
      }
      .punishment .txt {
        font-size: 0.84rem;
      }
      .remove-punishment-btn {
        width: 20px;
        height: 20px;
      }
      .history {
        max-height: none;
        overflow: visible;
        gap: 14px;
        margin-top: 14px;
        padding-top: 14px;
      }
      .entry {
        padding-left: 8px;
      }
      .entry .top {
        align-items: flex-start;
        gap: 6px;
      }
      .entry-tools {
        width: 100%;
        justify-content: space-between;
      }
      .attach-proof-btn {
        padding: 4px 8px;
        font-size: 0.72rem;
      }
      .proof-media {
        width: 100%;
      }
      .signature {
        margin-top: 14px;
        font-size: 0.72rem;
      }
    }

    @media (max-width: 390px) {
      body { padding: 12px; }
      .panel {
        padding: 12px 10px 10px;
      }
      .person-head {
        gap: 8px;
      }
      .avatar {
        width: 46px;
        height: 46px;
      }
      .punishment img {
        width: 50px;
        height: 50px;
      }
      .punishment .txt {
        font-size: 0.8rem;
      }
      .attach-proof-btn span {
        display: none;
      }
      .attach-proof-btn {
        width: 28px;
        height: 28px;
        padding: 0;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>ShipMent</h1>
      <p>Rutina en pareja: motivo + castigo + registro para Sebastian y Valentina.</p>
    </section>

    <section class="board" id="board"></section>
    <p class="signature">Powered by <strong>WeWeb</strong></p>
  </main>

  <template id="panel-template">
    <article class="panel">
      <div class="person-head">
        <img class="avatar" alt="" />
        <h2></h2>
      </div>
      <form>
        <div class="motivos">
          <div>
            <label>Motivo del castigo</label>
            <input name="motivo" type="text" placeholder="Ej: Comio postre fuera de plan" required />
          </div>
          <div>
            <label>Nota (opcional)</label>
            <textarea name="nota" placeholder="Ej: Esta semana compensa con cardio extra."></textarea>
          </div>
        </div>

        <label>Escoge un castigo</label>
        <div class="cards"></div>
        <div class="custom-punishment">
          <label>Agregar castigo personalizado</label>
          <div class="custom-row">
            <input name="nuevoCastigo" type="text" placeholder="Ej: 40 jumping jacks" />
            <button type="button" class="add-punishment">Agregar castigo</button>
          </div>
        </div>

        <div class="actions">
          <button class="save" type="submit">Guardar castigo</button>
          <button class="clear" type="button">Limpiar historial</button>
        </div>
      </form>

      <section class="history"></section>
    </article>
  </template>

  <script>
    const STORAGE_KEY = "castigos-pareja-v2";
    const LEGACY_STORAGE_KEY = "castigos-pareja-v1";
    const CUSTOM_PUNISHMENTS_KEY = "castigos-custom-v1";
    const MAX_FILE_SIZE_MB = 8;

    const punishments = [
      {
        id: "lagartijas-10",
        title: "10 lagartijas",
        image: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=900&q=80"
      },
      {
        id: "abdominales-20",
        title: "20 abdominales",
        image: "https://images.unsplash.com/photo-1599058917765-a780eda07a3e?auto=format&fit=crop&w=900&q=80"
      },
      {
        id: "sentadillas-25",
        title: "25 sentadillas",
        image: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?auto=format&fit=crop&w=900&q=80"
      },
      {
        id: "plancha-60",
        title: "Plancha 60 segundos",
        image: "https://images.unsplash.com/photo-1574680096145-d05b474e2155?auto=format&fit=crop&w=900&q=80"
      }
    ];

    const people = [
      { key: "sebastian", label: "Sebastian", className: "sebastian", photo: "Foto Sebastian.jpeg" },
      { key: "valentina", label: "Valentina", className: "valentina", photo: "Foto Valentina.jpeg" }
    ];

    const safeParse = (value, fallback) => {
      try {
        return JSON.parse(value) ?? fallback;
      } catch {
        return fallback;
      }
    };

    const defaultState = { sebastian: [], valentina: [] };
    const savedV2 = safeParse(localStorage.getItem(STORAGE_KEY), null);
    const savedV1 = safeParse(localStorage.getItem(LEGACY_STORAGE_KEY), null);
    const state = savedV2 || savedV1 || defaultState;
    const customPunishments = safeParse(localStorage.getItem(CUSTOM_PUNISHMENTS_KEY), {
      sebastian: [],
      valentina: []
    });
    customPunishments.sebastian ||= [];
    customPunishments.valentina ||= [];

    const board = document.getElementById("board");
    const template = document.getElementById("panel-template");

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function saveCustomPunishments() {
      localStorage.setItem(CUSTOM_PUNISHMENTS_KEY, JSON.stringify(customPunishments));
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString("es-CO", {
        dateStyle: "short",
        timeStyle: "short"
      });
    }

    function renderProof(proof) {
      if (!proof?.dataUrl || !proof?.mimeType) return "";
      const linkText = proof.linkedTo ? `<p class="nota">Prueba vinculada a: ${proof.linkedTo}</p>` : "";
      if (proof.mimeType.startsWith("video/")) {
        return `${linkText}<video class="proof-media" src="${proof.dataUrl}" controls preload="metadata"></video>`;
      }
      if (proof.mimeType.startsWith("image/")) {
        return `${linkText}<img class="proof-media" src="${proof.dataUrl}" alt="Prueba del castigo" loading="lazy" />`;
      }
      return "";
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("No se pudo leer el archivo"));
        reader.readAsDataURL(file);
      });
    }

    function renderHistory(container, personKey) {
      const data = state[personKey];
      if (!data.length) {
        container.innerHTML = '<div class="empty">Todavia no hay castigos registrados.</div>';
        return;
      }

      container.innerHTML = data
        .map((item, index) => `
          <article class="entry">
            <div class="top">
              <span><strong>${item.castigo}</strong></span>
              <div class="entry-tools">
                <span>${formatDate(item.fecha)}</span>
                <button type="button" class="attach-proof-btn" data-index="${index}" aria-label="Adjuntar prueba a este castigo">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21.44 11.05L12.25 20.24a6 6 0 1 1-8.49-8.49l9.2-9.19a4 4 0 0 1 5.65 5.66l-9.2 9.19a2 2 0 1 1-2.83-2.83l8.48-8.48"></path>
                  </svg>
                  <span>${item.proof ? "Archivo" : "Adjuntar"}</span>
                </button>
              </div>
            </div>
            <p class="motivo">Motivo: ${item.motivo}</p>
            <p class="nota">${item.nota ? `Nota: ${item.nota}` : "Sin nota extra"}</p>
            ${renderProof(item.proof)}
          </article>
        `)
        .join("");
    }

    function getPunishmentImageByTitle(title) {
      const text = (title || "").toLowerCase();
      const imageMap = [
        {
          match: ["lagartija", "flexion", "push up", "pushup", "push-up"],
          image: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=900&q=80"
        },
        {
          match: ["abdominal", "crunch", "sit up", "situp", "core"],
          image: "https://images.unsplash.com/photo-1599058917765-a780eda07a3e?auto=format&fit=crop&w=900&q=80"
        },
        {
          match: ["sentadilla", "squat", "pierna", "zancada", "lunge"],
          image: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?auto=format&fit=crop&w=900&q=80"
        },
        {
          match: ["plancha", "plank"],
          image: "https://images.unsplash.com/photo-1574680096145-d05b474e2155?auto=format&fit=crop&w=900&q=80"
        },
        {
          match: ["burpee", "jumping jacks", "cardio", "correr", "trotar", "saltar cuerda"],
          image: "https://images.unsplash.com/photo-1549570652-97324981a6fd?auto=format&fit=crop&w=900&q=80"
        }
      ];

      for (const group of imageMap) {
        if (group.match.some((keyword) => text.includes(keyword))) return group.image;
      }

      return "https://images.unsplash.com/photo-1599058917212-d750089bc07e?auto=format&fit=crop&w=900&q=80";
    }

    function getAllPunishments(personKey) {
      const custom = (customPunishments[personKey] || []).map((title, i) => ({
        id: `custom-${personKey}-${i}`,
        title,
        image: getPunishmentImageByTitle(title),
        isCustom: true
      }));
      const base = punishments.map((p) => ({ ...p, isCustom: false }));
      return [...base, ...custom];
    }

    function createPunishmentCards(personKey, selectedValue) {
      return getAllPunishments(personKey)
        .map((p, i) => `
          <label class="punishment">
            <input ${(selectedValue ? selectedValue === p.title : i === 0) ? "checked" : ""} type="radio" name="castigo-${personKey}" value="${p.title}" />
            <img src="${p.image}" alt="${p.title}" loading="lazy" />
            <div class="punishment-main">
              <div class="txt">${p.title}</div>
              ${p.isCustom ? `
                <button type="button" class="remove-punishment-btn" data-remove-title="${p.title}" aria-label="Eliminar castigo personalizado">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 6h18"></path>
                    <path d="M8 6V4h8v2"></path>
                    <path d="M19 6l-1 14H6L5 6"></path>
                    <path d="M10 11v6"></path>
                    <path d="M14 11v6"></path>
                  </svg>
                </button>
              ` : ""}
            </div>
          </label>
        `)
        .join("");
    }

    function addPersonPanel(person) {
      const clone = template.content.cloneNode(true);
      const panel = clone.querySelector(".panel");
      const avatar = clone.querySelector(".avatar");
      panel.classList.add(person.className);
      panel.querySelector("h2").textContent = person.label;
      avatar.src = person.photo;
      avatar.alt = `Foto de ${person.label}`;

      const form = panel.querySelector("form");
      const cards = panel.querySelector(".cards");
      const history = panel.querySelector(".history");
      const clearBtn = panel.querySelector(".clear");
      const addPunishmentBtn = panel.querySelector(".add-punishment");
      const newPunishmentInput = form.elements["nuevoCastigo"];
      const proofPicker = document.createElement("input");
      proofPicker.type = "file";
      proofPicker.accept = "image/*,video/*";
      proofPicker.style.display = "none";
      panel.appendChild(proofPicker);
      let pendingAttachIndex = null;

      cards.innerHTML = createPunishmentCards(person.key);
      renderHistory(history, person.key);

      cards.addEventListener("click", (e) => {
        const removeBtn = e.target.closest(".remove-punishment-btn");
        if (!removeBtn) return;
        e.preventDefault();
        e.stopPropagation();

        const title = removeBtn.dataset.removeTitle;
        if (!title) return;

        customPunishments[person.key] = customPunishments[person.key].filter(
          (item) => item.toLowerCase() !== title.toLowerCase()
        );
        saveCustomPunishments();
        cards.innerHTML = createPunishmentCards(person.key);
      });

      addPunishmentBtn.addEventListener("click", () => {
        const value = newPunishmentInput.value.trim();
        if (!value) return;

        const exists = getAllPunishments(person.key).some((p) => p.title.toLowerCase() === value.toLowerCase());
        if (exists) {
          alert("Ese castigo ya existe.");
          return;
        }

        customPunishments[person.key].push(value);
        saveCustomPunishments();
        cards.innerHTML = createPunishmentCards(person.key, value);
        newPunishmentInput.value = "";
        newPunishmentInput.focus();
      });

      newPunishmentInput.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        e.preventDefault();
        addPunishmentBtn.click();
      });

      history.addEventListener("click", (e) => {
        const button = e.target.closest(".attach-proof-btn");
        if (!button) return;
        pendingAttachIndex = Number(button.dataset.index);
        proofPicker.click();
      });

      proofPicker.addEventListener("change", async () => {
        const pickedFile = proofPicker.files?.[0];
        if (pendingAttachIndex === null || !pickedFile) return;

        if (pickedFile.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
          alert(`El archivo es muy grande. Maximo ${MAX_FILE_SIZE_MB} MB.`);
          proofPicker.value = "";
          pendingAttachIndex = null;
          return;
        }

        const targetEntry = state[person.key][pendingAttachIndex];
        if (!targetEntry) {
          proofPicker.value = "";
          pendingAttachIndex = null;
          return;
        }

        const previousProof = targetEntry.proof ?? null;
        const dataUrl = await readFileAsDataURL(pickedFile);
        targetEntry.proof = {
          mimeType: pickedFile.type,
          dataUrl,
          linkedTo: targetEntry.castigo
        };

        try {
          saveState();
          renderHistory(history, person.key);
        } catch {
          targetEntry.proof = previousProof;
          alert("No se pudo guardar la prueba adjunta por limite del navegador.");
        }

        proofPicker.value = "";
        pendingAttachIndex = null;
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const motivoInput = form.elements["motivo"];
        const notaInput = form.elements["nota"];
        const selected = form.querySelector(`input[name="castigo-${person.key}"]:checked`);

        const newEntry = {
          motivo: motivoInput.value.trim(),
          castigo: selected?.value || "Castigo personalizado",
          nota: notaInput.value.trim(),
          proof: null,
          fecha: new Date().toISOString()
        };

        if (!newEntry.motivo) return;

        state[person.key].unshift(newEntry);
        try {
          saveState();
        } catch {
          state[person.key].shift();
          alert("No se pudo guardar: la prueba es demasiado pesada para guardar en el navegador.");
          return;
        }
        renderHistory(history, person.key);

        motivoInput.value = "";
        notaInput.value = "";
        motivoInput.focus();
      });

      clearBtn.addEventListener("click", () => {
        const confirmClear = confirm(`Quieres borrar el historial de ${person.label}?`);
        if (!confirmClear) return;

        state[person.key] = [];
        saveState();
        renderHistory(history, person.key);
      });

      board.appendChild(clone);
    }

    people.forEach(addPersonPanel);
  </script>
</body>
</html>
