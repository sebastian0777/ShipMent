<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShipMent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #eef5ff;
      --bg-2: #dbeafe;
      --text: #0f1f3a;
      --muted: #4f6b95;
      --line: rgba(79, 107, 149, 0.28);
      --soft: rgba(79, 107, 149, 0.08);
      --accent-1: #0ea5e9;
      --accent-2: #fb923c;
      --success: #34d399;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(14, 165, 233, 0.16), transparent 34%),
        radial-gradient(circle at 85% 12%, rgba(249, 115, 22, 0.12), transparent 30%),
        radial-gradient(circle at 50% 95%, rgba(52, 211, 153, 0.1), transparent 32%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    body[data-theme="ocean"] {
      --bg-1: #e9f7ff;
      --bg-2: #d6efff;
      --text: #10263f;
      --muted: #3f678f;
      --line: rgba(63, 103, 143, 0.3);
      --soft: rgba(63, 103, 143, 0.08);
      --accent-1: #0284c7;
      --accent-2: #06b6d4;
    }

    body[data-theme="midnight"] {
      --bg-1: #070b14;
      --bg-2: #111827;
      --text: #e5edff;
      --muted: #95a6c9;
      --line: rgba(149, 166, 201, 0.3);
      --soft: rgba(149, 166, 201, 0.1);
      --accent-1: #38bdf8;
      --accent-2: #a78bfa;
    }

    body[data-theme="graphite"] {
      --bg-1: #0f1115;
      --bg-2: #1b1f27;
      --text: #eef2f7;
      --muted: #a4adba;
      --line: rgba(164, 173, 186, 0.3);
      --soft: rgba(164, 173, 186, 0.1);
      --accent-1: #22d3ee;
      --accent-2: #f59e0b;
    }

    body[data-theme="midnight"] .daily-quote,
    body[data-theme="graphite"] .daily-quote,
    body[data-theme="midnight"] .victory-wall h3,
    body[data-theme="graphite"] .victory-wall h3,
    body[data-theme="midnight"] .victory-item strong,
    body[data-theme="graphite"] .victory-item strong,
    body[data-theme="midnight"] .signature strong,
    body[data-theme="graphite"] .signature strong,
    body[data-theme="midnight"] .punishment .txt,
    body[data-theme="graphite"] .punishment .txt,
    body[data-theme="midnight"] .clear,
    body[data-theme="graphite"] .clear,
    body[data-theme="midnight"] .attach-proof-btn,
    body[data-theme="graphite"] .attach-proof-btn {
      color: #e5edff;
    }

    body[data-theme="midnight"] .signature,
    body[data-theme="graphite"] .signature,
    body[data-theme="midnight"] .victory-item p,
    body[data-theme="graphite"] .victory-item p,
    body[data-theme="midnight"] .entry .top,
    body[data-theme="graphite"] .entry .top,
    body[data-theme="midnight"] .entry .nota,
    body[data-theme="graphite"] .entry .nota,
    body[data-theme="midnight"] .streak,
    body[data-theme="graphite"] .streak {
      color: #b8c7e6;
    }

    body[data-theme="midnight"] .save,
    body[data-theme="graphite"] .save {
      color: #eaf6ff;
      background: rgba(56, 189, 248, 0.2);
      border-color: rgba(56, 189, 248, 0.45);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding-bottom: 60px;
      animation: rise 700ms ease-out;
    }

    .hero {
      text-align: center;
      margin-bottom: 30px;
    }

    .theme-dock {
      position: fixed;
      right: 18px;
      top: 16px;
      z-index: 30;
      display: grid;
      gap: 8px;
      justify-items: end;
    }

    .theme-toggle {
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 150ms ease, transform 150ms ease, color 150ms ease;
    }

    .theme-toggle:hover {
      opacity: 1;
      color: var(--accent-1);
      transform: translateY(-1px);
    }

    .theme-toggle:focus-visible {
      outline: 1px solid var(--line);
      outline-offset: 4px;
      opacity: 1;
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .theme-menu {
      display: none;
      gap: 8px;
      padding: 8px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(5px);
      grid-template-columns: repeat(2, minmax(0, 1fr));
      min-width: 92px;
    }

    .theme-menu.open {
      display: grid;
    }

    .theme-swatch {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      cursor: pointer;
    }

    .theme-swatch.active {
      outline: 2px solid var(--accent-1);
      outline-offset: 2px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-family: "Fraunces", serif;
      font-size: clamp(2.15rem, 4.4vw, 3.5rem);
      letter-spacing: 0.7px;
      font-weight: 700;
      background: linear-gradient(110deg, #1d4ed8, #0284c7, #ea580c, #1d4ed8);
      background-size: 280% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shine 8s linear infinite, float-title 4s ease-in-out infinite;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
      letter-spacing: 0.2px;
    }

    .motivation {
      margin: 22px 0 28px;
      padding: 8px 2px 12px;
      border-bottom: 1px solid rgba(173, 197, 236, 0.2);
      border-radius: 0;
      background: transparent;
    }

    .daily-quote {
      margin: 0;
      text-align: center;
      color: #1e3a8a;
      font-size: 0.92rem;
      letter-spacing: 0.2px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 36px;
    }

    .signature {
      margin: 36px 0 0;
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: #375681;
      opacity: 0.9;
    }

    .cloud-bar {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .cloud-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.18);
    }

    .cloud-dot.ok {
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.18);
    }

    .cloud-btn {
      border: 1px solid rgba(79, 107, 149, 0.28);
      background: transparent;
      color: var(--text);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.76rem;
      cursor: pointer;
    }

    .signature strong {
      color: #1e3a8a;
      font-weight: 700;
    }

    .victory-wall {
      margin: 30px 0 18px;
      padding: 18px 0 0;
      border-top: 1px solid rgba(173, 197, 236, 0.2);
      border-radius: 0;
      background: transparent;
      display: grid;
      gap: 14px;
    }

    .victory-wall h3 {
      margin: 0;
      font-size: 0.92rem;
      color: #1e3a8a;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .victory-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .victory-item {
      border: 0;
      border-left: 1px solid rgba(173, 197, 236, 0.2);
      border-radius: 0;
      padding: 4px 0 4px 10px;
      background: transparent;
    }

    .victory-item strong {
      display: block;
      font-size: 0.78rem;
      color: #1e3a8a;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .victory-item p {
      margin: 0;
      font-size: 0.82rem;
      color: #36557f;
      line-height: 1.35;
    }

    .panel {
      background: transparent;
      border-radius: 0;
      padding: 20px 8px 18px;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 0;
      height: 1px;
      background: rgba(79, 107, 149, 0.22);
      pointer-events: none;
    }

    .panel h2 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0.45px;
      text-transform: uppercase;
    }

    .streak {
      margin-left: auto;
      font-size: 0.72rem;
      color: #2f5284;
      border: 0;
      border-radius: 0;
      padding: 0;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0.9;
    }

    .person-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      object-fit: cover;
      border: 0;
      box-shadow: none;
    }

    .motivos {
      display: grid;
      gap: 14px;
      margin-bottom: 16px;
    }

    label {
      font-size: 0.78rem;
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.9px;
    }

    input[type="text"], textarea {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(79, 107, 149, 0.35);
      background: transparent;
      color: var(--text);
      border-radius: 0;
      padding: 10px 0;
      font: inherit;
      outline: none;
      transition: border-color 180ms ease, background-color 180ms ease;
    }

    input[type="text"]::placeholder,
    textarea::placeholder {
      color: var(--muted);
      opacity: 0.45;
    }

    input[type="text"]:focus, textarea:focus {
      border-bottom-color: rgba(14, 165, 233, 0.8);
      background: transparent;
    }

    textarea {
      min-height: 62px;
      resize: vertical;
    }

    .cards {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .punishment-tip {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .custom-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .custom-head label {
      margin-bottom: 0;
    }

    .custom-toggle {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid rgba(79, 107, 149, 0.35);
      background: transparent;
      color: var(--text);
      padding: 0;
      font-size: 1.1rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .custom-punishment {
      margin: 0;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 220ms ease, opacity 180ms ease, margin 220ms ease;
    }

    .custom-punishment.open {
      margin: 8px 0 16px;
      max-height: 140px;
      opacity: 1;
    }

    .custom-head {
      margin-bottom: 14px;
    }

    .custom-row {
      display: flex;
      gap: 8px;
      align-items: end;
    }

    .custom-row input {
      flex: 1;
    }

    .add-punishment {
      border: 1px solid rgba(79, 107, 149, 0.28);
      background: transparent;
      color: #204b85;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.86rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .punishment {
      border: 0;
      border-radius: 14px;
      padding: 6px;
      background: transparent;
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease;
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .punishment:hover {
      transform: translateX(3px);
      background: rgba(173, 197, 236, 0.08);
    }

    .punishment input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .punishment img {
      width: 76px;
      height: 76px;
      object-fit: cover;
      display: block;
      filter: saturate(1.1);
      border-radius: 10px;
    }

    .punishment .txt {
      font-size: 0.95rem;
      color: #153867;
      font-weight: 600;
    }

    .punishment-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
    }

    .remove-punishment-btn {
      border: 1px solid rgba(248, 113, 113, 0.25);
      background: transparent;
      color: #fbb8b8;
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .remove-punishment-btn svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .punishment:has(input:checked) {
      background: rgba(14, 165, 233, 0.14);
      transform: translateX(0);
    }

    .actions {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 150ms ease, filter 150ms ease, opacity 150ms ease;
    }

    .save {
      background: rgba(14, 165, 233, 0.2);
      color: #0e3058;
      flex: 1;
      border: 1px solid rgba(14, 165, 233, 0.4);
    }

    .clear {
      background: transparent;
      color: #204b85;
      border: 1px solid rgba(79, 107, 149, 0.3);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.07);
    }

    .custom-row .add-punishment {
      border: 1px solid rgba(79, 107, 149, 0.28);
      background: transparent;
      color: #204b85;
    }

    .history {
      border-top: 1px solid rgba(79, 107, 149, 0.22);
      margin-top: 12px;
      padding-top: 12px;
      max-height: 300px;
      overflow: auto;
      display: grid;
      gap: 12px;
    }

    .entry {
      background: transparent;
      border: 0;
      border-left: 1px solid rgba(14, 165, 233, 0.42);
      border-radius: 0;
      padding: 2px 0 2px 10px;
      animation: pop 260ms ease;
    }

    .entry .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.86rem;
      color: #36557f;
      flex-wrap: wrap;
    }

    .entry-tools {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .attach-proof-btn {
      border: 1px solid rgba(79, 107, 149, 0.28);
      background: transparent;
      color: #204b85;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.78rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .attach-proof-btn svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .entry .motivo {
      margin: 6px 0 3px;
      font-weight: 600;
      word-break: break-word;
    }

    .entry .nota {
      margin: 0;
      color: #44648f;
      font-size: 0.92rem;
      word-break: break-word;
    }

    .proof-media {
      margin-top: 8px;
      width: min(100%, 340px);
      border-radius: 8px;
      border: 1px solid rgba(79, 107, 149, 0.24);
      display: block;
    }

    .proof-wrap {
      margin-top: 6px;
    }

    .proof-wrap summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 0.82rem;
      user-select: none;
    }


    .empty {
      color: #4f6b95;
      font-size: 0.92rem;
      opacity: 0.9;
    }

    .celebration {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      transition: all 240ms ease;
      z-index: 20;
      border: 1px solid rgba(79, 107, 149, 0.26);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(14, 165, 233, 0.18);
      color: #0f2f56;
      font-size: 0.86rem;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    .celebration.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .panel.sebastian h2 { color: #0284c7; }
    .panel.valentina h2 { color: #f472b6; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shine {
      0% { background-position: 0% 50%; }
      100% { background-position: 280% 50%; }
    }

    @keyframes float-title {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 950px) {
      .board {
        grid-template-columns: none;
        grid-auto-flow: column;
        grid-auto-columns: minmax(82vw, 420px);
        overflow-x: auto;
        gap: 14px;
        padding-bottom: 6px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }
      .board::-webkit-scrollbar {
        height: 6px;
      }
      .board::-webkit-scrollbar-thumb {
        background: rgba(173, 197, 236, 0.45);
        border-radius: 999px;
      }
      .panel {
        scroll-snap-align: start;
      }
    }

    @media (max-width: 600px) {
      body { padding: 16px; }
      .wrap { max-width: 100%; padding-bottom: 72px; }
      .hero { margin-bottom: 24px; }
      .hero h1 { font-size: clamp(1.75rem, 8.6vw, 2.2rem); }
      .actions { flex-direction: column; }
      .hero p { font-size: 0.9rem; }
      .theme-dock {
        right: 10px;
        top: 10px;
      }
      .theme-toggle {
        padding: 3px;
      }
      .theme-menu {
        min-width: 92px;
      }
      .motivation { margin: 16px 0 22px; }
      .daily-quote { font-size: 0.84rem; }
      .board {
        gap: 18px;
        grid-auto-columns: minmax(88vw, 360px);
      }
      .panel {
        border-radius: 0;
        padding: 12px 11px 11px;
      }
      .panel h2 { font-size: 1rem; }
      .streak {
        font-size: 0.62rem;
        padding: 0;
      }
      label {
        font-size: 0.68rem;
        letter-spacing: 0.7px;
      }
      input[type="text"], textarea {
        font-size: 0.9rem;
      }
      .cards { gap: 10px; margin-bottom: 14px; }
      .avatar {
        width: 52px;
        height: 52px;
      }
      .custom-row {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      .custom-head {
        margin-bottom: 18px;
      }
      .add-punishment {
        width: 100%;
        font-size: 0.8rem;
      }
      .punishment img {
        width: 56px;
        height: 56px;
      }
      .punishment {
        gap: 10px;
        padding: 5px;
      }
      .punishment .txt {
        font-size: 0.84rem;
      }
      .remove-punishment-btn {
        width: 20px;
        height: 20px;
      }
      .history {
        max-height: none;
        overflow: visible;
        gap: 14px;
        margin-top: 14px;
        padding-top: 14px;
      }
      .entry {
        padding-left: 8px;
      }
      .entry .top {
        align-items: flex-start;
        gap: 6px;
      }
      .entry-tools {
        width: 100%;
        justify-content: space-between;
      }
      .attach-proof-btn {
        padding: 4px 8px;
        font-size: 0.72rem;
      }
      .proof-media {
        width: 100%;
      }
      .victory-wall {
        margin-top: 22px;
        padding: 14px 0 0;
      }
      .victory-grid {
        grid-template-columns: 1fr;
      }
      .signature {
        margin-top: 28px;
        font-size: 0.72rem;
      }
      .celebration {
        font-size: 0.75rem;
        max-width: calc(100vw - 24px);
        white-space: normal;
        text-align: center;
      }
    }

    @media (max-width: 390px) {
      body { padding: 12px; }
      .panel {
        padding: 12px 10px 10px;
      }
      .person-head {
        gap: 8px;
      }
      .avatar {
        width: 46px;
        height: 46px;
      }
      .punishment img {
        width: 50px;
        height: 50px;
      }
      .punishment .txt {
        font-size: 0.8rem;
      }
      .attach-proof-btn span {
        display: none;
      }
      .attach-proof-btn {
        width: 28px;

  <script>

    const safeParse = (value, fallback) => {

      } catch {
        return fallback;

    const state = { sebastian: [], valentina: [] };
    const customPunishments = safeParse(localStorage.getItem(CUSTOM_PUNISHMENTS_KEY), {
      sebastian: [],
      valentina: []

    customPunishments.sebastian ||= [];
    customPunishments.valentina ||= [];

    const board = document.getElementById("board");

    const themeSwatches = [...document.querySelectorAll(".theme-swatch")];
    const dailyQuoteElement = document.getElementById("daily-quote");
    const victoryWallElement = document.getElementById("victory-wall");
    const celebrationElement = document.getElementById("celebration");
    const cloudDotElement = document.getElementById("cloud-dot");
    const cloudStatusElement = document.getElementById("cloud-status");
    const cloudSetupButton = document.getElementById("cloud-setup");
    const THEME_KEY = "shipment-theme-v1";
    let celebrationTimer = null;

    let supabaseClient = null;
    let cloudConfig = safeParse(localStorage.getItem(CLOUD_CONFIG_KEY), null) || {
      url: DEFAULT_SUPABASE_URL,
      anonKey: DEFAULT_SUPABASE_ANON_KEY,
      room: "shipment-room"
    };
    let realtimeChannel = null;

    const motivationalQuotes = [
      "Un castigo hoy, una version mas fuerte manana.",
      "Disciplina en pareja: cuando uno cae, el otro levanta.",
      "No buscamos perfeccion, buscamos constancia.",
      "Cada repeticion cuenta para la mejor version de ustedes.",
      "ShipMent: amor, disciplina y resultados.",
      "Hoy duele, manana se agradece."
    ];

    function setCloudStatus(text, ok = false) {
      cloudStatusElement.textContent = text;
      cloudDotElement.classList.toggle("ok", ok);
    }

    async function setStateFromRows(rows) {
      state.sebastian = [];
      state.valentina = [];
      for (const row of rows) {
        const guessType = (() => {
          const url = (row.proof_url || "").toLowerCase();
          if (row.proof_type) return row.proof_type;
          if (url.match(/\.(jpg|jpeg|png|webp|gif)(\?|$)/)) return "image/*";
          if (url.match(/\.(mp4|mov|webm|m4v)(\?|$)/)) return "video/*";
          return "";
        })();

        let proofUrl = row.proof_url || "";
        if (proofUrl && supabaseClient && !/^https?:\/\//i.test(proofUrl)) {
          const { data: signedData } = await supabaseClient.storage
            .from("punishment-proofs")
            .createSignedUrl(proofUrl, 60 * 60 * 24 * 7);
          if (signedData?.signedUrl) proofUrl = signedData.signedUrl;
        }

        if (!state[row.person_key]) return;
        state[row.person_key].push({
          id: row.id,
          motivo: row.motivo,
          castigo: row.castigo,
          nota: row.nota || "",
          fecha: row.fecha || row.created_at,
          proof: proofUrl ? {
            mimeType: guessType,
            dataUrl: proofUrl,
            linkedTo: row.linked_to || row.castigo
          } : null
        });
      }
      state.sebastian.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
      state.valentina.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
    }

    async function fetchCloudRows() {
      if (!supabaseClient || !cloudConfig?.room) return [];
      const { data, error } = await supabaseClient
        .from("punishments")
        .select("*")
        .eq("room_id", cloudConfig.room)
        .order("fecha", { ascending: false });
      if (error) throw error;
      return data || [];
    }

    async function refreshFromCloud() {
      const rows = await fetchCloudRows();
      await setStateFromRows(rows);
      refreshAllPanels();
      renderVictoryWall();
    }

    async function connectCloud() {
      if (!cloudConfig?.url || !cloudConfig?.anonKey || !cloudConfig?.room) {
        setCloudStatus("Sincronizacion: configura Supabase");
        return;
      }
      try {
        supabaseClient = window.supabase.createClient(cloudConfig.url, cloudConfig.anonKey);
        await refreshFromCloud();
        if (realtimeChannel) {
          supabaseClient.removeChannel(realtimeChannel);
          realtimeChannel = null;
        }
        realtimeChannel = supabaseClient
          .channel(`room-${cloudConfig.room}`)
          .on("postgres_changes", {
            event: "*",
            schema: "public",
            table: "punishments",
            filter: `room_id=eq.${cloudConfig.room}`
          }, async () => {
            try {
              await refreshFromCloud();
            } catch {}
          })
          .subscribe();
        setCloudStatus(`Sincronizacion: conectada (${cloudConfig.room})`, true);
      } catch (error) {
        setCloudStatus("Sincronizacion: error de conexion");
        alert(`No se pudo conectar con Supabase: ${error.message}`);
      }
    }

    function setupCloudConfig() {
      const url = prompt("Supabase URL (https://xxxx.supabase.co)", cloudConfig?.url || DEFAULT_SUPABASE_URL);
      if (!url) return;
      const anonKey = prompt("Supabase Anon Key", cloudConfig?.anonKey || DEFAULT_SUPABASE_ANON_KEY);
      if (!anonKey) return;
      const room = prompt("Codigo de sala compartida (igual para ambos)", cloudConfig?.room || "shipment-room");
      if (!room) return;
      cloudConfig = { url: url.trim(), anonKey: anonKey.trim(), room: room.trim() };
      localStorage.setItem(CLOUD_CONFIG_KEY, JSON.stringify(cloudConfig));
      connectCloud();
    }

    function saveCustomPunishments() {
      localStorage.setItem(CUSTOM_PUNISHMENTS_KEY, JSON.stringify(customPunishments));
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString("es-CO", {
        dateStyle: "short",
        timeStyle: "short"
      });
    }

    function getDateKey(dateLike) {
      const d = new Date(dateLike);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function getStreak(entries) {
      if (!entries.length) return 0;
      const dayNumbers = [...new Set(entries.map((item) => getDateKey(item.fecha)))]
        .map((dateKey) => new Date(`${dateKey}T00:00:00`).getTime())
        .sort((a, b) => b - a);

      let streak = 1;
      for (let i = 0; i < dayNumbers.length - 1; i += 1) {
        const current = dayNumbers[i];
        const next = dayNumbers[i + 1];
        const oneDay = 24 * 60 * 60 * 1000;
        if (current - next === oneDay) {
          streak += 1;
        } else {
          break;
        }
      }
      return streak;
    }

    function getDailyQuote() {
      const todayKey = getDateKey(new Date());
      const numericSeed = todayKey.split("-").join("").split("").reduce((acc, n) => acc + Number(n), 0);
      return motivationalQuotes[numericSeed % motivationalQuotes.length];
    }

    function renderDailyQuote() {
      dailyQuoteElement.textContent = getDailyQuote();
    }

    function buildMilestones(entries) {
      const total = entries.length;
      const withProof = entries.filter((item) => item.proof).length;
      const streak = getStreak(entries);
      const goals = [];
      if (total >= 1) goals.push("Primer castigo registrado");
      if (total >= 5) goals.push("5 castigos cumplidos");
      if (total >= 10) goals.push("10 castigos cumplidos");
      if (withProof >= 3) goals.push("3 pruebas subidas");
      if (streak >= 3) goals.push(`${streak} dias de racha`);
      return goals.length ? goals.join(" • ") : "Empiecen hoy y desbloqueen su primera victoria.";
    }

    function renderVictoryWall() {
      const totalSebastian = state.sebastian.length;
      const totalValentina = state.valentina.length;
      const totalPareja = totalSebastian + totalValentina;

      victoryWallElement.innerHTML = `
        <h3>Muro de Victorias</h3>
        <div class="victory-grid">
          <article class="victory-item">
            <strong>Sebastian</strong>
            <p>${buildMilestones(state.sebastian)}</p>
          </article>
          <article class="victory-item">
            <strong>Valentina</strong>
            <p>${buildMilestones(state.valentina)}</p>
          </article>
          <article class="victory-item">
            <strong>Pareja</strong>
            <p>${totalPareja ? `${totalPareja} castigos registrados juntos.` : "Aun no hay registros en pareja."}</p>
          </article>
        </div>
      `;
    }

    function showCelebration(personLabel, punishment) {
      celebrationElement.textContent = `🔥 ${personLabel} completo: ${punishment}`;
      celebrationElement.classList.add("show");
      clearTimeout(celebrationTimer);
      celebrationTimer = setTimeout(() => {
        celebrationElement.classList.remove("show");
      }, 1800);
    }

    function applyTheme(theme) {
      if (!theme || theme === "default") {
        document.body.removeAttribute("data-theme");
      } else {
        document.body.setAttribute("data-theme", theme);
      }
      themeSwatches.forEach((swatch) => {
        swatch.classList.toggle("active", swatch.dataset.theme === (theme || "default"));
      });
    }

    function renderProof(proof) {
      if (!proof?.dataUrl) return "";
      const mime = (proof.mimeType || "").toLowerCase();
      const linkText = proof.linkedTo ? `<p class="nota">Prueba vinculada a: ${proof.linkedTo}</p>` : "";
      if (mime.startsWith("video/")) {
        return `${linkText}<details class="proof-wrap"><summary>Ver prueba</summary><video class="proof-media" src="${proof.dataUrl}" controls preload="metadata" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','<p class=&quot;nota&quot;>No se pudo mostrar el video aqui.</p>');"></video></details>`;
      }
      if (mime.startsWith("image/")) {
        return `${linkText}<details class="proof-wrap"><summary>Ver prueba</summary><img class="proof-media" src="${proof.dataUrl}" alt="Prueba del castigo" loading="lazy" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','<p class=&quot;nota&quot;>No se pudo mostrar la imagen aqui.</p>');" /></details>`;
      }
      return `${linkText}<details class="proof-wrap"><summary>Ver prueba</summary><p class="nota">Archivo no compatible para vista previa.</p></details>`;
    }

    async function ensureCloudReady() {
      if (!supabaseClient) {
        alert("Primero configuren Supabase desde el boton 'Configurar Supabase'.");
        return false;
      }
      return true;
    }

    async function createCloudEntry(personKey, entry) {
      const { error } = await supabaseClient
        .from("punishments")
        .insert({
          room_id: cloudConfig.room,
          person_key: personKey,
          motivo: entry.motivo,
          castigo: entry.castigo,
          nota: entry.nota || "",
          fecha: entry.fecha
        });
      if (error) throw error;
    }

    async function uploadProofAndSave(entryId, file, linkedTo) {
      const ext = file.name.includes(".") ? file.name.split(".").pop() : "bin";
      const path = `${cloudConfig.room}/${entryId}/${Date.now()}.${ext}`;
      const { error: uploadError } = await supabaseClient.storage
        .from("punishment-proofs")
        .upload(path, file, { upsert: true });
      if (uploadError) throw uploadError;

      const { error: updateError } = await supabaseClient
        .from("punishments")
        .update({
          proof_url: path,
          proof_type: file.type || "",
          linked_to: linkedTo || ""
        })
        .eq("id", entryId);
      if (updateError) throw updateError;
    }

    async function clearCloudByPerson(personKey) {
      const { error } = await supabaseClient
        .from("punishments")
        .delete()
        .eq("room_id", cloudConfig.room)
        .eq("person_key", personKey);
      if (error) throw error;
    }

    function renderHistory(container, personKey) {
      const data = (state[personKey] || [])
        .map((entry, index) => ({
          ...entry,
          ownerKey: personKey,
          ownerIndex: index
        }))
        .sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
      if (!data.length) {
        container.innerHTML = '<div class="empty">Todavia no hay castigos registrados.</div>';
        return;
      }

      container.innerHTML = data
        .map((item) => `
          <article class="entry">
            <div class="top">
              <span><strong>${item.castigo}</strong></span>
              <div class="entry-tools">
                <span>${formatDate(item.fecha)}</span>
                <button type="button" class="attach-proof-btn" data-entry-id="${item.id || ""}" data-owner="${item.ownerKey}" data-owner-index="${item.ownerIndex}" aria-label="Adjuntar prueba a este castigo">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21.44 11.05L12.25 20.24a6 6 0 1 1-8.49-8.49l9.2-9.19a4 4 0 0 1 5.65 5.66l-9.2 9.19a2 2 0 1 1-2.83-2.83l8.48-8.48"></path>
                  </svg>
                  <span>${item.proof ? "Archivo" : "Adjuntar"}</span>
                </button>
              </div>
            </div>
            <p class="motivo">Motivo: ${item.motivo}</p>
            <p class="nota">${item.nota ? `Nota: ${item.nota}` : "Sin nota extra"}</p>
            ${renderProof(item.proof)}
          </article>
        `)
        .join("");
    }

    function refreshAllPanels() {
      panelBindings.forEach((binding) => {
        renderHistory(binding.history, binding.personKey);
        binding.streakNode.textContent = `Racha: ${getStreak(state[binding.personKey])} dias`;
      });

    function getPunishmentImageByTitle(title) {
      const text = (title || "").toLowerCase();
      const imageMap = [
        {
          match: ["lagartija", "flexion", "push up", "pushup", "push-up"],
          image: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=900&q=80"
        },
        {
          match: ["abdominal", "crunch", "sit up", "situp", "core"],
          image: "https://images.unsplash.com/photo-1599058917765-a780eda07a3e?auto=format&fit=crop&w=900&q=80"
        },
        {
          match: ["sentadilla", "squat", "pierna", "zancada", "lunge"],
          image: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?auto=format&fit=crop&w=900&q=80"
        },
        {
          match: ["plancha", "plank"],
          image: "https://images.unsplash.com/photo-1574680096145-d05b474e2155?auto=format&fit=crop&w=900&q=80"
        },
        {
          match: ["burpee", "jumping jacks", "cardio", "correr", "trotar", "saltar cuerda"],
          image: "https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&w=900&q=80"
        }
      ];

      for (const group of imageMap) {
        if (group.match.some((keyword) => text.includes(keyword))) return group.image;
      }

      return "https://images.unsplash.com/photo-1599058917212-d750089bc07e?auto=format&fit=crop&w=900&q=80";
    }

    function getAllPunishments(personKey) {
      const custom = (customPunishments[personKey] || []).map((title, i) => ({
        id: `custom-${personKey}-${i}`,
        title,
        image: getPunishmentImageByTitle(title),
        isCustom: true
      }));
      const base = punishments.map((p) => ({ ...p, isCustom: false }));
      return [...base, ...custom];
    }

    function createPunishmentCards(personKey, selectedValue) {
      return getAllPunishments(personKey)
        .map((p, i) => `
          <label class="punishment">
            <input ${(selectedValue ? selectedValue === p.title : i === 0) ? "checked" : ""} type="radio" name="castigo-${personKey}" value="${p.title}" />
            <img src="${p.image}" alt="${p.title}" loading="lazy" />
            <div class="punishment-main">
              <div class="txt">${p.title}</div>
              ${p.isCustom ? `
                <button type="button" class="remove-punishment-btn" data-remove-title="${p.title}" aria-label="Eliminar castigo personalizado">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 6h18"></path>
                    <path d="M8 6V4h8v2"></path>
                    <path d="M19 6l-1 14H6L5 6"></path>
                    <path d="M10 11v6"></path>
                    <path d="M14 11v6"></path>
                  </svg>
                </button>
              ` : ""}
            </div>
          </label>
        `)
        .join("");
    }

    function addPersonPanel(person) {
      const clone = template.content.cloneNode(true);
      const panel = clone.querySelector(".panel");
      const avatar = clone.querySelector(".avatar");
      const streakNode = clone.querySelector("[data-streak]");
      panel.classList.add(person.className);
      panel.querySelector("h2").textContent = person.label;
      avatar.src = person.photo;
      avatar.alt = `Foto de ${person.label}`;

      const form = panel.querySelector("form");
      const cards = panel.querySelector(".cards");
      const history = panel.querySelector(".history");
      const clearBtn = panel.querySelector(".clear");
      const addPunishmentBtn = panel.querySelector(".add-punishment");
      const customToggleBtn = panel.querySelector(".custom-toggle");
      const customPunishmentBox = panel.querySelector(".custom-punishment");
      const newPunishmentInput = form.elements["nuevoCastigo"];
      const proofPicker = document.createElement("input");
      proofPicker.type = "file";
      proofPicker.accept = "image/*,video/*";
      proofPicker.style.display = "none";
      panel.appendChild(proofPicker);
      let pendingAttach = null;

      cards.innerHTML = createPunishmentCards(person.key);
      panelBindings.push({ personKey: person.key, history, streakNode });
      refreshAllPanels();

      customToggleBtn.addEventListener("click", () => {
        const isOpen = customPunishmentBox.classList.toggle("open");
        customToggleBtn.textContent = isOpen ? "−" : "+";
        customToggleBtn.setAttribute("aria-expanded", String(isOpen));
        if (isOpen) newPunishmentInput.focus();
      });

      cards.addEventListener("click", (e) => {
        const removeBtn = e.target.closest(".remove-punishment-btn");
        if (!removeBtn) return;
        e.preventDefault();
        e.stopPropagation();

        const title = removeBtn.dataset.removeTitle;
        if (!title) return;

        customPunishments[person.key] = customPunishments[person.key].filter(
          (item) => item.toLowerCase() !== title.toLowerCase()
        );
        saveCustomPunishments();
        cards.innerHTML = createPunishmentCards(person.key);
      });

      addPunishmentBtn.addEventListener("click", () => {
        const value = newPunishmentInput.value.trim();
        if (!value) return;

        const exists = getAllPunishments(person.key).some((p) => p.title.toLowerCase() === value.toLowerCase());
        if (exists) {
          alert("Ese castigo ya existe.");
          return;
        }

        customPunishments[person.key].push(value);
        saveCustomPunishments();
        cards.innerHTML = createPunishmentCards(person.key, value);
        newPunishmentInput.value = "";
        customPunishmentBox.classList.remove("open");
        customToggleBtn.textContent = "+";
        customToggleBtn.setAttribute("aria-expanded", "false");
      });

      newPunishmentInput.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        e.preventDefault();
        addPunishmentBtn.click();
      });

      history.addEventListener("click", (e) => {
        const button = e.target.closest(".attach-proof-btn");
        if (!button) return;
        pendingAttach = {
          entryId: button.dataset.entryId || null,
          ownerKey: button.dataset.owner,
          ownerIndex: Number(button.dataset.ownerIndex)
        };
        proofPicker.click();
      });

      proofPicker.addEventListener("change", async () => {
        const pickedFile = proofPicker.files?.[0];
        if (!pendingAttach || !pickedFile) return;
        if (!(await ensureCloudReady())) return;

        if (pickedFile.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
          alert(`El archivo es muy grande. Maximo ${MAX_FILE_SIZE_MB} MB.`);
          proofPicker.value = "";
          pendingAttach = null;
          return;
        }

        let entryId = pendingAttach.entryId;
        if (!entryId) {
          const targetList = state[pendingAttach.ownerKey] || [];
          const targetEntry = targetList[pendingAttach.ownerIndex];
          entryId = targetEntry?.id || null;
        }
        if (!entryId) {
          proofPicker.value = "";
          pendingAttach = null;
          return;
        }

        try {
          await uploadProofAndSave(entryId, pickedFile, "");
          await refreshFromCloud();
        } catch (error) {
          alert(`No se pudo guardar la prueba adjunta: ${error.message}`);
        }

        proofPicker.value = "";
        pendingAttach = null;
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!(await ensureCloudReady())) return;

        const motivoInput = form.elements["motivo"];
        const notaInput = form.elements["nota"];
        const selected = form.querySelector(`input[name="castigo-${person.key}"]:checked`);

        const newEntry = {
          motivo: motivoInput.value.trim(),
          castigo: selected?.value || "Castigo personalizado",
          nota: notaInput.value.trim(),
          fecha: new Date().toISOString()
        };

        if (!newEntry.motivo) return;
        try {
          await createCloudEntry(person.key, newEntry);
          await refreshFromCloud();
        } catch (error) {
          alert(`No se pudo guardar: ${error.message}`);
          return;
        }
        showCelebration(person.label, newEntry.castigo);

        motivoInput.value = "";
        notaInput.value = "";
        motivoInput.focus();
      });

      clearBtn.addEventListener("click", async () => {
        const confirmClear = confirm(`Quieres borrar el historial de ${person.label}?`);
        if (!confirmClear) return;
        if (!(await ensureCloudReady())) return;
        try {
          await clearCloudByPerson(person.key);
          await refreshFromCloud();
        } catch (error) {
          alert(`No se pudo limpiar: ${error.message}`);
        }
      });

      board.appendChild(clone);
    }

    const savedTheme = localStorage.getItem(THEME_KEY) || "default";
    applyTheme(savedTheme);

    themeToggle.addEventListener("click", () => {
      const isOpen = themeMenu.classList.toggle("open");
      themeToggle.setAttribute("aria-expanded", String(isOpen));
    });

    themeSwatches.forEach((swatch) => {
      swatch.addEventListener("click", () => {
        const nextTheme = swatch.dataset.theme || "default";
        localStorage.setItem(THEME_KEY, nextTheme);
        applyTheme(nextTheme);
        themeMenu.classList.remove("open");
        themeToggle.setAttribute("aria-expanded", "false");
      });
    });

    document.addEventListener("click", (e) => {
      if (e.target.closest(".theme-dock")) return;
      themeMenu.classList.remove("open");
      themeToggle.setAttribute("aria-expanded", "false");
    });

    cloudSetupButton.addEventListener("click", setupCloudConfig);

    renderDailyQuote();
    people.forEach(addPersonPanel);
    renderVictoryWall();
    connectCloud();
  </script>
</body>
</html>
